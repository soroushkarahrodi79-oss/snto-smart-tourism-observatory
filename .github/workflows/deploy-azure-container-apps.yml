name: Deploy to Azure Container Apps

# CI/CD: on every push to main, rebuild the image in ACR and roll the
# Container App to it. Run deploy/azure-bootstrap.sh ONCE first to create the
# resources, then configure the repository secrets listed below.
#
# Required repo secrets (Settings ▸ Secrets and variables ▸ Actions):
#   AZURE_CREDENTIALS  -> output of:
#       az ad sp create-for-rbac --name snto-deployer \
#         --role contributor \
#         --scopes /subscriptions/<SUB_ID>/resourceGroups/rg-snto-observatory \
#         --sdk-auth
#   ACR_NAME           -> your ACR name (e.g. acrsnto12345)
#
# Required repo variables (or hard-code below):
#   RESOURCE_GROUP=rg-snto-observatory
#   APP_NAME=snto-observatory

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  RESOURCE_GROUP: rg-snto-observatory
  APP_NAME: snto-observatory
  IMAGE_REPO: snto

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build image in ACR
        run: |
          az acr build \
            --registry "${{ secrets.ACR_NAME }}" \
            --image "${IMAGE_REPO}:${GITHUB_SHA::8}" \
            --image "${IMAGE_REPO}:latest" \
            .

      - name: Roll Container App to new image
        run: |
          ACR_SERVER="$(az acr show -n "${{ secrets.ACR_NAME }}" --query loginServer -o tsv)"
          az containerapp update \
            -g "${RESOURCE_GROUP}" \
            -n "${APP_NAME}" \
            --image "${ACR_SERVER}/${IMAGE_REPO}:${GITHUB_SHA::8}"

      - name: Output live URL
        run: |
          FQDN="$(az containerapp show -g "${RESOURCE_GROUP}" -n "${APP_NAME}" \
            --query properties.configuration.ingress.fqdn -o tsv)"
          echo "### ✅ Deployed: https://${FQDN}" >> "$GITHUB_STEP_SUMMARY"
