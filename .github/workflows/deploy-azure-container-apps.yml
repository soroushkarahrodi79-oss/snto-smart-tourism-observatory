name: Deploy to Azure Container Apps

# CI/CD: after CI passes on main, build the image, push it to ACR, and roll the
# Container App to it.
#
# AUTENTICACIÓN: OIDC + user-assigned managed identity (UAMI).
# El tenant de la UCM bloquea `az ad sp create-for-rbac` (app-registration), así
# que NO se usa un service principal con secreto. En su lugar, una UAMI (recurso
# ARM, permitido al owner de la suscripción) con una *federated credential* hacia
# este repo permite a GitHub Actions obtener un token sin secretos.
#
# Secrets/variables usados (Settings ▸ Secrets and variables ▸ Actions):
#   ACR_LOGIN_SERVER       -> acrsnto1781009309.azurecr.io   (ya existe)
#   ACR_USERNAME           -> usuario admin de ACR           (ya existe)
#   ACR_PASSWORD           -> password admin de ACR          (ya existe)
#   AZURE_CLIENT_ID        -> clientId de la UAMI            (nuevo, OIDC)
#   AZURE_TENANT_ID        -> tenantId de Azure              (nuevo, OIDC)
#   AZURE_SUBSCRIPTION_ID  -> id de la suscripción           (nuevo, OIDC)
#
# Provisión Azure (UNA sola vez, en Azure Cloud Shell con identidad owner):
#   RG=rg-snto-observatory-app
#   az identity create -g $RG -n id-snto-gha-deployer
#   CID=$(az identity show -g $RG -n id-snto-gha-deployer --query clientId -o tsv)
#   OID=$(az identity show -g $RG -n id-snto-gha-deployer --query principalId -o tsv)
#   SUB=$(az account show --query id -o tsv)
#   # Federated credential: rama main de este repo (cubre push y workflow_dispatch)
#   az identity federated-credential create -g $RG --identity-name id-snto-gha-deployer \
#     --name gha-main \
#     --issuer https://token.actions.githubusercontent.com \
#     --subject repo:soroushkarahrodi79-oss/snto-smart-tourism-observatory:ref:refs/heads/main \
#     --audiences api://AzureADTokenExchange
#   # Rol mínimo: Contributor sobre el RG (suficiente para containerapp update)
#   az role assignment create --assignee-object-id $OID --assignee-principal-type ServicePrincipal \
#     --role Contributor --scope /subscriptions/$SUB/resourceGroups/$RG
#   echo "AZURE_CLIENT_ID=$CID"; echo "AZURE_TENANT_ID=$(az account show --query tenantId -o tsv)"; echo "AZURE_SUBSCRIPTION_ID=$SUB"
# Copia esos 3 valores como secrets del repo.

on:
  # Gobernanza ADR-009: el deploy SOLO corre cuando CI concluye en verde sobre
  # main (encadenado workflow_run). El intento anterior de encadenado fallaba
  # porque no filtraba las ejecuciones de CI disparadas por pull_request y hacía
  # checkout del HEAD por defecto en vez del SHA del run de CI; ambos se
  # corrigen aquí (branches: [main] + condición de conclusión + DEPLOY_SHA).
  # workflow_dispatch queda como vía manual de emergencia/rollback.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # necesario para que azure/login obtenga el token OIDC

env:
  RESOURCE_GROUP: rg-snto-observatory-app
  APP_NAME: snto-observatory
  IMAGE_REPO: snto
  # SHA que se construye/despliega: el del run de CI que disparó el encadenado
  # (en workflow_run, github.sha apunta al HEAD de main en el momento del
  # trigger, que puede no ser el commit validado por CI). En dispatch manual,
  # el HEAD de la rama elegida.
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Gate ADR-009: solo si CI concluyó en verde (o dispatch manual explícito).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout (commit validado por CI)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # ── Build & push usando las credenciales admin de ACR (ya existentes) ────
      - name: Log in to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            "${{ secrets.ACR_LOGIN_SERVER }}" \
            -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build & push image
        run: |
          IMG="${{ secrets.ACR_LOGIN_SERVER }}/${IMAGE_REPO}"
          docker build -t "${IMG}:${DEPLOY_SHA::8}" -t "${IMG}:latest" .
          docker push "${IMG}:${DEPLOY_SHA::8}"
          docker push "${IMG}:latest"

      # ── Roll de la Container App vía OIDC (sin secreto de service principal) ──
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Roll Container App to new image
        run: |
          IMG="${{ secrets.ACR_LOGIN_SERVER }}/${IMAGE_REPO}:${DEPLOY_SHA::8}"
          # --revision-suffix fuerza una revisión nueva aunque el tag no cambiara.
          az containerapp update -g "${RESOURCE_GROUP}" -n "${APP_NAME}" \
            --image "${IMG}" \
            --revision-suffix "s${DEPLOY_SHA::8}"
          FQDN="$(az containerapp show -g "${RESOURCE_GROUP}" -n "${APP_NAME}" \
            --query properties.configuration.ingress.fqdn -o tsv)"
          echo "### ✅ Deployed: https://${FQDN}" >> "$GITHUB_STEP_SUMMARY"

      - name: Health check
        run: |
          FQDN="$(az containerapp show -g "${RESOURCE_GROUP}" -n "${APP_NAME}" \
            --query properties.configuration.ingress.fqdn -o tsv)"
          for i in $(seq 1 10); do
            code="$(curl -s -o /dev/null -w '%{http_code}' "https://${FQDN}/_stcore/health" || true)"
            echo "intento ${i}: HTTP ${code}"
            [ "${code}" = "200" ] && exit 0
            sleep 15
          done
          echo "::warning::health check no devolvió 200 (posible arranque en frío); revisar manualmente"
