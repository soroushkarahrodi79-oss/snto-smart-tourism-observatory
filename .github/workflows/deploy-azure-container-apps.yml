name: Deploy to Azure Container Apps

# CI/CD: after CI passes on main, build the image, push it to ACR, and roll the
# Container App to it.
#
# Secrets used (Settings ▸ Secrets and variables ▸ Actions):
#   ACR_LOGIN_SERVER   -> e.g. acrsnto12345.azurecr.io   (you already have this)
#   ACR_USERNAME       -> ACR admin username             (you already have this)
#   ACR_PASSWORD       -> ACR admin password             (you already have this)
#   AZURE_CREDENTIALS  -> service-principal JSON for the final "roll" step.
#                         Create it once in Azure Cloud Shell:
#                           az ad sp create-for-rbac --name snto-deployer \
#                             --role contributor \
#                             --scopes /subscriptions/<SUB_ID> --sdk-auth
#                         Paste the WHOLE JSON output as this secret.
#
# Build & push use the ACR_* admin secrets (no Azure login needed). Only the
# Container App update needs AZURE_CREDENTIALS (control-plane operation).

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  RESOURCE_GROUP: rg-snto-observatory-app
  APP_NAME: snto-observatory
  IMAGE_REPO: snto

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build & push using the ACR admin credentials you already have ────────
      - name: Log in to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            "${{ secrets.ACR_LOGIN_SERVER }}" \
            -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build & push image
        run: |
          IMG="${{ secrets.ACR_LOGIN_SERVER }}/${IMAGE_REPO}"
          docker build -t "${IMG}:${GITHUB_SHA::8}" -t "${IMG}:latest" .
          docker push "${IMG}:${GITHUB_SHA::8}"
          docker push "${IMG}:latest"

      # ── Roll the Container App (needs Azure control-plane auth) ───────────────
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Roll Container App to new image
        run: |
          az containerapp update -g "${RESOURCE_GROUP}" -n "${APP_NAME}" \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/${IMAGE_REPO}:${GITHUB_SHA::8}"
          FQDN="$(az containerapp show -g "${RESOURCE_GROUP}" -n "${APP_NAME}" \
            --query properties.configuration.ingress.fqdn -o tsv)"
          echo "### ✅ Deployed: https://${FQDN}" >> "$GITHUB_STEP_SUMMARY"
